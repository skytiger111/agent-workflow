<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>線上點餐 — 味味牛肉麵</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ===== 導覽列 ===== -->
<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="brand">味味牛肉麵</a>
    <nav class="header-nav" id="headerNav">
      <a href="/order" class="nav-link active">菜單點餐</a>
      <a href="/order#lookup" class="nav-link">查詢訂單</a>
      <div class="header-auth" id="headerAuth">
        <button class="btn btn-outline" id="btnLogin">會員登入</button>
      </div>
      <div class="header-member hidden" id="headerMember">
        <span class="member-greeting" id="memberGreeting"></span>
        <span class="member-points-badge">點數：<strong id="headerPoints">—</strong></span>
        <button class="btn btn-outline btn-sm" id="btnLogout">登出</button>
      </div>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="選單">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- ===== 點餐主體 ===== -->
<main class="order-layout container" id="orderApp">

  <!-- 左側：菜單 -->
  <aside class="menu-section" id="menuSection">
    <div class="section-header">
      <h1 class="page-title">線上點餐</h1>
      <p class="page-subtitle">選擇您想要的餐點，加入購物車</p>
    </div>

    <!-- 分類篩選 -->
    <div class="category-tabs" id="categoryTabs">
      <button class="cat-tab active" data-category="">全部</button>
    </div>

    <!-- 菜單網格 -->
    <div class="menu-grid" id="menuGrid">
      <div class="loading-state">載入菜單中…</div>
    </div>
  </aside>

  <!-- 右側：購物車 -->
  <aside class="cart-section" id="cartSection">
    <div class="cart-card sticky">
      <div class="cart-header">
        <h2>購物車</h2>
        <span class="cart-count-badge" id="cartCount">0</span>
      </div>

      <div class="cart-items" id="cartItems">
        <div class="cart-empty">購物車是空的</div>
      </div>

      <!-- 會員點數折抵 -->
      <div class="cart-redeem" id="cartRedeem">
        <label for="redeemPoints">
          <span>折抵點數</span>
          <span class="text-muted" id="redeemHint"></span>
        </label>
        <div class="redeem-input-row">
          <input type="number" id="redeemPoints" min="0" placeholder="輸入要折抵的點數" value="0">
          <button class="btn btn-outline btn-sm" id="btnMaxRedeem">全用</button>
        </div>
        <div class="redeem-preview text-muted" id="redeemPreview"></div>
      </div>

      <div class="cart-summary" id="cartSummary">
        <div class="summary-row">
          <span>小計</span>
          <span id="subtotal">$0</span>
        </div>
        <div class="summary-row redeem-row hidden" id="redeemRow">
          <span>點數折抵</span>
          <span class="text-success" id="redeemAmount">-$0</span>
        </div>
        <div class="summary-row total-row">
          <span>合計</span>
          <span id="totalPrice">$0</span>
        </div>
      </div>

      <button class="btn btn-primary btn-block" id="btnCheckout" disabled>填寫訂單</button>
    </div>
  </aside>
</main>

<!-- ===== 結帳表單 Modal ===== -->
<div class="modal-overlay hidden" id="checkoutModal">
  <div class="modal modal-lg" role="dialog" aria-modal="true" aria-labelledby="checkoutTitle">
    <h3 id="checkoutTitle" class="modal-title">填寫訂單資訊</h3>

    <div class="checkout-member-banner hidden" id="memberBanner">
      <span id="memberBannerText"></span>
    </div>

    <form id="checkoutForm" class="modal-form" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="custName">姓名 <span class="required">*</span></label>
          <input type="text" id="custName" name="customer_name" placeholder="王小明" required>
        </div>
        <div class="form-group">
          <label for="custPhone">電話 <span class="required">*</span></label>
          <input type="tel" id="custPhone" name="customer_phone" placeholder="0912345678" maxlength="10" required>
        </div>
      </div>

      <div class="form-group">
        <label for="custNotes">備註</label>
        <textarea id="custNotes" name="notes" rows="2" placeholder="不要蔥、不要辣…"></textarea>
      </div>

      <div class="checkout-summary">
        <div class="summary-row">
          <span>小計</span><span id="coSubtotal">$0</span>
        </div>
        <div class="summary-row redeem-row hidden" id="coRedeemRow">
          <span>點數折抵</span><span class="text-success" id="coRedeemAmount">-$0</span>
        </div>
        <div class="summary-row total-row">
          <span>實付金額</span><span id="coTotal">$0</span>
        </div>
        <div class="summary-row earn-row hidden" id="coEarnRow">
          <span>本單可累積</span><span class="text-accent" id="coEarn">+0 點</span>
        </div>
      </div>

      <div class="form-error hidden" id="checkoutError"></div>

      <div class="modal-actions">
        <button type="submit" class="btn btn-primary btn-lg">送出訂單</button>
        <button type="button" class="btn btn-outline" id="checkoutCancel">取消</button>
      </div>
    </form>
  </div>
</div>

<!-- ===== 訂單完成 Modal ===== -->
<div class="modal-overlay hidden" id="successModal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="successTitle">
    <div class="success-icon">✅</div>
    <h3 id="successTitle" class="modal-title">訂單已送出！</h3>
    <div class="success-detail" id="successDetail"></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-primary" id="btnNewOrder">繼續點餐</button>
    </div>
  </div>
</div>

<!-- ===== 查詢訂單 ===== -->
<section class="section lookup-section" id="lookup">
  <div class="container">
    <h2 class="section-title">查詢訂單</h2>
    <div class="lookup-form">
      <input type="tel" id="lookupPhone" placeholder="請輸入當初訂餐的電話" maxlength="10">
      <button class="btn btn-primary" id="btnLookup">查詢</button>
    </div>
    <div class="orders-list" id="ordersList"></div>
  </div>
</section>

<!-- ===== 登入 Modal（參考首頁） ===== -->
<div class="modal-overlay hidden" id="loginModal">
  <div class="modal" role="dialog" aria-modal="true">
    <h3 class="modal-title">會員登入</h3>
    <form id="loginForm" class="modal-form" novalidate>
      <div class="form-group">
        <label for="loginPhone">電話號碼</label>
        <input type="tel" id="loginPhone" name="phone" placeholder="0912345678" maxlength="10" required>
      </div>
      <div class="form-group">
        <label for="loginPassword">密碼</label>
        <input type="password" id="loginPassword" name="password" required>
      </div>
      <div class="form-error hidden" id="loginError"></div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">登入</button>
        <button type="button" class="btn btn-outline" id="loginCancel">取消</button>
      </div>
    </form>
  </div>
</div>

<!-- ===== 頁尾 ===== -->
<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-brand">
      <span class="brand">味味牛肉麵</span>
      <p>新北市板橋區文化路一段 123 號</p>
    </div>
    <div class="footer-links">
      <a href="/">回首頁</a>
      <a href="/admin/login">管理後台</a>
    </div>
  </div>
  <div class="footer-copy">
    <p>© 2026 味味牛肉麵 · Developed with 🐯 by 標虎團隊</p>
  </div>
</footer>

<script>
// ─── 狀態 ───────────────────────────────────────────────────────
let menuData = [];
let cart = [];           // [{id, name, price, quantity}]
let currentCategory = '';
let memberSession = {};
const SESSION_KEY = 'member';

// ─── 工具 ───────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)) || {}; }
  catch { return {}; }
}

function saveSession(data) {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(data));
  memberSession = data;
  renderMemberUI();
}

function clearSession() {
  sessionStorage.removeItem(SESSION_KEY);
  memberSession = {};
  renderMemberUI();
}

function renderMemberUI() {
  const auth = $('headerAuth');
  const mb = $('headerMember');
  if (!memberSession.member_id) {
    auth.classList.remove('hidden');
    mb.classList.add('hidden');
    $('cartRedeem').classList.add('hidden');
  } else {
    auth.classList.add('hidden');
    mb.classList.remove('hidden');
    $('headerMember').classList.remove('hidden');
    $('memberGreeting').textContent = memberSession.name + '，你好';
    $('headerPoints').textContent = memberSession.points;
    $('cartRedeem').classList.remove('hidden');
    $('redeemHint').textContent = `可用 ${memberSession.points} 點`;
  }
}

async function apiFetch(url, opts = {}) {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw Object.assign(new Error(json.error || '請求失敗'), { status: res.status, json });
  return json;
}

function formatPrice(n) { return '$' + (n || 0); }
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.id = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('toast-show'), 10);
  setTimeout(() => { t.classList.remove('toast-show'); setTimeout(() => t.remove(), 300); }, 2500);
}

// ─── 載入菜單 ───────────────────────────────────────────────────
async function loadMenu() {
  try {
    const { menu } = await apiFetch('/api/menu');
    menuData = menu;
    renderCategories(menu);
    renderMenu();
  } catch {
    $('menuGrid').innerHTML = '<p class="error-state">載入失敗，請刷新重試。</p>';
  }
}

function renderCategories(menu) {
  const cats = ['', ...new Set(menu.map(i => i.category).filter(Boolean))];
  $('categoryTabs').innerHTML = cats.map(c =>
    `<button class="cat-tab ${c === '' ? 'active' : ''}" data-category="${c}">${c || '全部'}</button>`
  ).join('');
}

function renderMenu() {
  const filtered = currentCategory ? menuData.filter(i => i.category === currentCategory) : menuData;
  if (filtered.length === 0) {
    $('menuGrid').innerHTML = '<p class="empty-state">此分類尚無品項</p>';
    return;
  }
  $('menuGrid').innerHTML = filtered.map(item => `
    <div class="menu-card ${!item.available ? 'menu-unavailable' : ''}" data-id="${item.id}">
      <div class="menu-card-body">
        <span class="menu-category-tag">${item.category || ''}</span>
        <h3 class="menu-card-name">${item.name}</h3>
        <p class="menu-card-price">$${item.price}</p>
        ${!item.available ? '<span class="unavailable-badge">已售完</span>' : `
          <button class="btn btn-primary btn-sm btn-add-cart" data-id="${item.id}">+ 加入</button>
        `}
      </div>
    </div>
  `).join('');
}

// ─── 分類切換 ───────────────────────────────────────────────────
$('categoryTabs').addEventListener('click', e => {
  const btn = e.target.closest('.cat-tab');
  if (!btn) return;
  currentCategory = btn.dataset.category;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu();
});

// ─── 加入購物車 ────────────────────────────────────────────────
$('menuGrid').addEventListener('click', e => {
  const btn = e.target.closest('.btn-add-cart');
  if (!btn) return;
  const id = parseInt(btn.dataset.id);
  const item = menuData.find(i => i.id === id);
  if (!item) return;
  const existing = cart.find(c => c.id === id);
  if (existing) {
    existing.quantity++;
  } else {
    cart.push({ id: item.id, name: item.name, price: item.price, quantity: 1 });
  }
  renderCart();
  toast(`${item.name} 已加入購物車`);
});

// ─── 購物車渲染 ────────────────────────────────────────────────
function renderCart() {
  const items = $('cartItems');
  $('cartCount').textContent = cart.reduce((s, i) => s + i.quantity, 0);
  $('btnCheckout').disabled = cart.length === 0;

  if (cart.length === 0) {
    items.innerHTML = '<div class="cart-empty">購物車是空的</div>';
    $('subtotal').textContent = '$0';
    $('totalPrice').textContent = '$0';
    $('redeemRow').classList.add('hidden');
    $('coRedeemRow').classList.add('hidden');
    updateRedeem();
    return;
  }

  items.innerHTML = cart.map(c => `
    <div class="cart-item">
      <div class="cart-item-info">
        <span class="cart-item-name">${c.name}</span>
        <span class="cart-item-price">${formatPrice(c.price)}</span>
      </div>
      <div class="cart-item-controls">
        <button class="qty-btn qty-dec" data-id="${c.id}">−</button>
        <span class="qty-value">${c.quantity}</span>
        <button class="qty-btn qty-inc" data-id="${c.id}">+</button>
        <button class="qty-btn qty-remove" data-id="${c.id}">✕</button>
      </div>
    </div>
  `).join('');

  const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  $('subtotal').textContent = formatPrice(subtotal);
  updateRedeem();
  updateCartTotal();
}

function updateCartTotal() {
  const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const redeem = getRedeemAmount();
  const total = Math.max(0, subtotal - redeem);
  $('totalPrice').textContent = formatPrice(total);
  $('coSubtotal').textContent = formatPrice(subtotal);
  $('coTotal').textContent = formatPrice(total);
  $('coEarn').textContent = `+${subtotal} 點`;
  $('coEarnRow').classList.remove('hidden');
  if (redeem > 0) {
    $('redeemRow').classList.remove('hidden');
    $('coRedeemRow').classList.remove('hidden');
    $('redeemAmount').textContent = '-$' + redeem;
    $('coRedeemAmount').textContent = '-$' + redeem;
  } else {
    $('redeemRow').classList.add('hidden');
    $('coRedeemRow').classList.add('hidden');
  }
}

function getRedeemAmount() {
  const val = parseInt($('redeemPoints')?.value) || 0;
  const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const maxByPoints = memberSession.points || 0;
  return Math.min(val, maxByPoints, subtotal);
}

function updateRedeem() {
  const redeem = getRedeemAmount();
  const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const total = Math.max(0, subtotal - redeem);
  $('redeemPreview').textContent = redeem > 0 ? `折抵 $${redeem}，實付 $${total}` : '';
  updateCartTotal();
}

$('redeemPoints')?.addEventListener('input', updateRedeem);

$('btnMaxRedeem')?.addEventListener('click', () => {
  if (!memberSession.points) return;
  const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const max = Math.min(memberSession.points, subtotal);
  $('redeemPoints').value = max;
  updateRedeem();
});

// ─── 購物車增減刪 ───────────────────────────────────────────────
$('cartItems').addEventListener('click', e => {
  const btn = e.target;
  const id = parseInt(btn.dataset.id);
  if (!id) return;
  if (btn.classList.contains('qty-inc')) {
    const item = cart.find(c => c.id === id);
    if (item) { item.quantity++; renderCart(); }
  } else if (btn.classList.contains('qty-dec')) {
    const item = cart.find(c => c.id === id);
    if (item) {
      if (item.quantity > 1) { item.quantity--; } else { cart = cart.filter(c => c.id !== id); }
      renderCart();
    }
  } else if (btn.classList.contains('qty-remove')) {
    cart = cart.filter(c => c.id !== id);
    renderCart();
  }
});

// ─── 結帳 Modal ────────────────────────────────────────────────
$('btnCheckout')?.addEventListener('click', () => {
  const sess = getSession();
  if (sess.member_id) {
    $('memberBanner').classList.remove('hidden');
    $('memberBannerText').textContent = `登入會員：${sess.name}（可用 ${sess.points} 點）`;
    $('custName').value = sess.name || '';
    $('custPhone').value = sess.phone || '';
  } else {
    $('memberBanner').classList.add('hidden');
  }
  $('checkoutModal').classList.remove('hidden');
  updateCartTotal();
});

$('checkoutCancel')?.addEventListener('click', () =>
  $('checkoutModal').classList.add('hidden'));

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.add('hidden'); });
});

$('checkoutForm')?.addEventListener('submit', async e => {
  e.preventDefault();
  const err = $('checkoutError');
  err.classList.add('hidden');
  const sess = getSession();
  const redeem = getRedeemAmount();
  const body = {
    items: cart.map(c => ({ id: c.id, quantity: c.quantity })),
    customer_name: $('custName').value.trim(),
    customer_phone: $('custPhone').value.trim(),
    notes: $('custNotes').value.trim(),
  };
  if (sess.member_id) body.redeem_points = redeem;
  try {
    const res = await apiFetch('/api/checkout', { method: 'POST', body: JSON.stringify(body) });
    $('checkoutModal').classList.add('hidden');
    // 更新 session 點數
    if (sess.member_id) {
      saveSession({ ...sess, points: res.remaining_points ?? sess.points });
    }
    showSuccess(res);
    cart = [];
    renderCart();
  } catch (err) {
    err.textContent = err.message;
    err.classList.remove('hidden');
  }
});

function showSuccess(res) {
  $('successDetail').innerHTML = `
    <p class="success-order-id">訂單編號：#${res.order_id}</p>
    <p>小計：${formatPrice(res.subtotal)}</p>
    ${res.redeem_points ? `<p>折抵：-${res.redeem_amount} 元（使用 ${res.redeem_points} 點）</p>` : ''}
    <p class="success-total">實付金額：<strong>${formatPrice(res.total)}</strong></p>
    ${res.points_earned ? `<p class="success-points">本次累積 <strong>${res.points_earned}</strong> 點</p>` : ''}
    <p class="text-muted">${res.message}</p>
  `;
  $('successModal').classList.remove('hidden');
}

$('btnNewOrder')?.addEventListener('click', () => {
  $('successModal').classList.add('hidden');
  $('custName').value = '';
  $('custPhone').value = '';
  $('custNotes').value = '';
  $('redeemPoints').value = 0;
});

// ─── 登入 ──────────────────────────────────────────────────────
$('btnLogin')?.addEventListener('click', () => {
  closeAllModals();
  $('loginModal').classList.remove('hidden');
});
$('loginCancel')?.addEventListener('click', () => $('loginModal').classList.add('hidden'));
$('loginForm')?.addEventListener('submit', async e => {
  e.preventDefault();
  const errEl = $('loginError');
  errEl.classList.add('hidden');
  const data = { phone: $('loginPhone').value.trim(), password: $('loginPassword').value };
  try {
    const res = await apiFetch('/api/members/login', { method: 'POST', body: JSON.stringify(data) });
    saveSession(res);
    $('loginModal').classList.add('hidden');
    renderCart();
    toast('登入成功！');
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
});

$('btnLogout')?.addEventListener('click', () => {
  clearSession();
  $('redeemPoints').value = 0;
  renderCart();
  toast('已登出');
});

function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
}

// ─── 查詢訂單 ───────────────────────────────────────────────────
$('btnLookup')?.addEventListener('click', async () => {
  const phone = $('lookupPhone').value.trim();
  if (!phone) { toast('請輸入電話'); return; }
  const list = $('ordersList');
  list.innerHTML = '<div class="loading-state">查詢中…</div>';
  try {
    const { orders } = await apiFetch('/api/orders?phone=' + encodeURIComponent(phone));
    if (!orders || orders.length === 0) {
      list.innerHTML = '<p class="empty-state">找不到任何訂單</p>';
      return;
    }
    const statusLabel = { pending: '等待中', preparing: '製作中', completed: '已完成', cancelled: '已取消' };
    list.innerHTML = orders.map(o => `
      <div class="order-card">
        <div class="order-card-header">
          <span class="order-id">#${o.id}</span>
          <span class="order-status status-${o.status}">${statusLabel[o.status] || o.status}</span>
        </div>
        <div class="order-items">
          ${(o.items || []).map(i => `<span class="order-item">${i.name} × ${i.quantity}</span>`).join('')}
        </div>
        <div class="order-footer">
          <span class="order-total">${formatPrice(o.total)}</span>
          ${o.redeem_points ? `<span class="order-redeem">折抵 ${o.redeem_points} 點</span>` : ''}
          <span class="order-date">${o.created_at ? new Date(o.created_at).toLocaleString('zh-Hant') : ''}</span>
        </div>
      </div>
    `).join('');
  } catch {
    list.innerHTML = '<p class="error-state">查詢失敗，請稍後重試</p>';
  }
});

// ─── 汉堡選單 ───────────────────────────────────────────────────
$('hamburger')?.addEventListener('click', () => {
  $('headerNav').classList.toggle('nav-open');
});

// ─── 初始化 ─────────────────────────────────────────────────────
(async () => {
  memberSession = getSession();
  renderMemberUI();
  await loadMenu();
  renderCart();
})();
</script>
</body>
</html>
